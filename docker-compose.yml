services:
  searxng:
    image: searxng/searxng:latest
    container_name: searxng
    restart: unless-stopped
    ports:
      # Bind to localhost only. Do not expose SearXNG directly to the internet.
      - "127.0.0.1:8888:8080"
    environment:
      SEARXNG_BASE_URL: ${SEARXNG_BASE_URL:-http://localhost:8888/}
      FORCE_OWNERSHIP: "true"
    volumes:
      - ./searxng:/etc/searxng
      - searxng-cache:/var/cache/searxng

  webfetch-api:
    build: ./api
    container_name: webfetch-api
    restart: unless-stopped
    depends_on:
      - searxng
    ports:
      # Bind to localhost only. Put a reverse proxy/VPN with auth in front for remote use.
      - "127.0.0.1:8889:8000"
    environment:
      SEARXNG_URL: http://searxng:8080/search
      # Optional shared secret for /websearch and /webfetch.
      # If set, clients must send X-API-Key or Authorization: Bearer <key>.
      WEB_API_KEY: ${WEB_API_KEY:-}

volumes:
  searxng-cache:
