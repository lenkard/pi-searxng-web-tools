services:
  searxng:
    image: searxng/searxng:latest
    container_name: searxng
    restart: unless-stopped
    ports:
      # Bind to localhost by default. Set SEARXNG_BIND to a private/VPN IP only if needed.
      - "${SEARXNG_BIND:-127.0.0.1}:8888:8080"
    environment:
      SEARXNG_BASE_URL: ${SEARXNG_BASE_URL:-http://localhost:8888/}
      FORCE_OWNERSHIP: "true"
    volumes:
      - ./searxng:/etc/searxng
      - searxng-cache:/var/cache/searxng

  webfetch-api:
    build: ./api
    container_name: webfetch-api
    restart: unless-stopped
    depends_on:
      - searxng
    ports:
      # Bind to localhost by default. Set WEB_API_BIND to a private/VPN IP only if pi runs in another container.
      - "${WEB_API_BIND:-127.0.0.1}:8889:8000"
    environment:
      SEARXNG_URL: http://searxng:8080/search
      # Optional shared secret for /websearch and /webfetch.
      # If set, clients must send X-API-Key or Authorization: Bearer <key>.
      WEB_API_KEY: ${WEB_API_KEY:-}

volumes:
  searxng-cache:
