version: 2
updates:
  # SearXNG base image digest (searxng/Dockerfile)
  - package-ecosystem: docker
    directory: /searxng
    schedule:
      interval: weekly
    commit-message:
      prefix: "deps(searxng)"

  # Python base image digest (api/Dockerfile)
  - package-ecosystem: docker
    directory: /api
    schedule:
      interval: weekly
    commit-message:
      prefix: "deps(api)"

  # Python dependencies (api/requirements.txt)
  - package-ecosystem: pip
    directory: /api
    schedule:
      interval: weekly
    commit-message:
      prefix: "deps(api)"
    groups:
      python-minor:
        update-types: [minor, patch]

  # GitHub Actions used in CI workflows
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: "deps(ci)"
