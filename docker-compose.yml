services:
  searxng:
    build: ./searxng
    image: pi-searxng-patched:latest
    container_name: searxng
    restart: unless-stopped
    ports:
      # Bind to localhost by default. Set SEARXNG_BIND to a private/VPN IP only if needed.
      - "${SEARXNG_BIND:-127.0.0.1}:8888:8080"
    environment:
      SEARXNG_BASE_URL: ${SEARXNG_BASE_URL:-http://localhost:8888/}
      # SearXNG reads this as server.secret_key. Keep it in .env, not settings.yml.
      SEARXNG_SECRET: ${SEARXNG_SECRET:?Set SEARXNG_SECRET in .env}
      FORCE_OWNERSHIP: "true"
    volumes:
      - ./searxng:/etc/searxng
      # Patch custom Google CSE instances missing supported_domains traits.
      - ./searxng/engines/google_cse.py:/usr/local/searxng/searx/engines/google_cse.py:ro
      - ./searxng/engines/google.py:/usr/local/searxng/searx/engines/google.py:ro
      - searxng-cache:/var/cache/searxng

  webfetch-api:
    build: ./api
    container_name: webfetch-api
    restart: unless-stopped
    depends_on:
      - searxng
    ports:
      # Bind to localhost by default. Set WEB_API_BIND to a private/VPN IP only if pi runs in another container.
      - "${WEB_API_BIND:-127.0.0.1}:8889:8000"
    environment:
      SEARXNG_URL: http://searxng:8080/search
      # Sequential fallback chain; callers may still pass an engines parameter.
      SEARXNG_DEFAULT_ENGINES: ${SEARXNG_DEFAULT_ENGINES:-google cse,mojeek,yep,bing,mwmbl,wiby}
      SEARCH_CACHE_TTL_SECONDS: ${SEARCH_CACHE_TTL_SECONDS:-900}
      ENGINE_COOLDOWN_SECONDS: ${ENGINE_COOLDOWN_SECONDS:-300}
      BALANCED_QUALITY_THRESHOLD: ${BALANCED_QUALITY_THRESHOLD:-0.58}
      # Optional shared secret for /websearch and /webfetch.
      # If set, clients must send X-API-Key or Authorization: Bearer <key>.
      WEB_API_KEY: ${WEB_API_KEY:-}

volumes:
  searxng-cache:
