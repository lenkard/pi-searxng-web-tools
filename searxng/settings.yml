use_default_settings:
  engines:
    # General engines observed working from a new OCI datacenter IP on 2026-07-10.
    # Scraping-based engines can still degrade or block the IP over time; an API
    # provider should be the long-term primary and SearXNG the fallback.
    keep_only:
      - bing
      - mojeek
      - yep
      - wiby
      - wikipedia
      - github
      - arxiv
      - pypi

server:
  # server.secret_key is provided by the SEARXNG_SECRET environment variable.
  # Keep the actual secret in .env, not in this file.
  bind_address: "0.0.0.0"
  limiter: false
  public_instance: false
  image_proxy: true
  method: "GET"

search:
  safe_search: 0
  autocomplete: ""
  default_lang: "auto"
  formats:
    - html
    - json
  ban_time_on_fail: 10
  max_ban_time_on_fail: 300

ui:
  static_use_hash: true
  default_theme: simple
  center_alignment: false
  query_in_title: false
  infinite_scroll: true
  results_on_new_tab: true
  theme_args:
    simple_style: auto

outgoing:
  request_timeout: 8.0
  max_request_timeout: 15.0
  pool_connections: 100
  pool_maxsize: 20
  enable_http2: true
